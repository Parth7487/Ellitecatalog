<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Ti - Client Reference Inventory Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-yellow: #d4ff00;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success-green: #10b981;
            --error-red: #ef4444;
            --button-blue: #0284c7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 2rem;
            min-height: 100vh;
        }
        header {
            max-width: 1600px;
            margin: 0 auto 2rem auto;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 2rem; font-weight: 700; color: var(--accent-yellow); margin-bottom: 0.3rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.95rem; }
        
        /* Parent Tabs */
        .parent-tabs-wrapper {
            max-width: 1600px;
            margin: 0 auto 1.5rem;
            overflow-x: auto;
        }
        .parent-tabs {
            display: flex;
            gap: 0.8rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            min-width: max-content;
        }
        .parent-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.9rem 1.6rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .parent-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .parent-btn.active {
            background: var(--accent-yellow);
            color: #000;
            border-color: var(--accent-yellow);
        }

        /* Sub Category Tabs (For Hoods/Aero/Set3/Green) */
        .sub-tabs-wrapper {
            max-width: 1600px;
            margin: 0 auto 1rem;
            overflow-x: auto;
        }
        .sub-tabs {
            display: flex;
            gap: 0.5rem;
            min-width: max-content;
        }
        .sub-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sub-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }
        .sub-btn.active {
            background: rgba(212, 255, 0, 0.1);
            color: var(--accent-yellow);
            border-color: var(--accent-yellow);
        }

        /* Child Brand Tabs */
        .child-tabs-wrapper {
            max-width: 1600px;
            margin: 0 auto 1.5rem;
            overflow-x: auto;
        }
        .child-tabs {
            display: flex;
            gap: 0.5rem;
            min-width: max-content;
        }
        .child-btn {
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .child-btn:hover { color: #fff; }
        .child-btn.active {
            color: var(--accent-yellow);
            border-bottom-color: var(--accent-yellow);
        }

        .panel-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .panel-title { font-size: 1.1rem; font-weight: 600; color: var(--accent-yellow); }
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--accent-yellow); }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        thead tr { background: rgba(212, 255, 0, 0.05); border-bottom: 1px solid var(--border-color); }
        th {
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-yellow);
            text-align: left;
        }
        tbody tr { border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255, 255, 255, 0.02); }
        td { padding: 1rem; font-size: 0.85rem; vertical-align: top; }
        
        .pid-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .pid-badge:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        
        .variants-list { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; }
        .variant-item { display: flex; gap: 0.5rem; }
        .v-name { color: #c4b5fd; font-weight: 600; }
        .v-price { color: var(--text-primary); }
        
        .component-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.6rem;
            margin-bottom: 0.4rem;
        }
        .component-name { font-weight: 600; color: var(--accent-yellow); margin-bottom: 0.2rem; font-size: 0.8rem; }
        .component-variants { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.3; }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }
        .btn-action.preview { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success-green); color: #34d399; }
        .btn-action.admin { background: rgba(55, 65, 81, 0.4); border: 1px solid rgba(156, 163, 175, 0.4); color: #d1d5db; }
        
        .status-badge {
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success-green); }
        .status-draft { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-archived { background: rgba(156, 163, 175, 0.15); color: #9ca3af; }
        .no-results {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem;
            font-size: 0.9rem;
        }

        /* Parent Row Style */
        tr.parent-row {
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
        }
        
        tr.parent-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Component (Child) Row Style */
        tr.child-row {
            background: rgba(0, 0, 0, 0.15);
        }

        tr.child-row td {
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Carbon-Only Highlight Style */
        tr.carbon-only-row {
            background: rgba(212, 255, 0, 0.03);
        }

        .carbon-only-badge {
            background: rgba(212, 255, 0, 0.15);
            color: var(--accent-yellow);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(212, 255, 0, 0.3);
            display: inline-block;
            margin-top: 0.25rem;
        }

        .category-tag {
            background: rgba(2, 132, 199, 0.15);
            color: #38bdf8;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(2, 132, 199, 0.3);
            display: inline-block;
        }

        /* Supra Section Highlighting */
        .supra-parent-row {
            background: rgba(251, 146, 60, 0.09) !important;
            border-left: 4px solid #f97316;
        }
        .supra-child-row {
            background: rgba(251, 146, 60, 0.04) !important;
            border-left: 4px solid rgba(249, 115, 22, 0.35);
        }
        .supra-badge {
            background: rgba(249, 115, 22, 0.18);
            color: #fb923c;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            border: 1px solid rgba(249, 115, 22, 0.4);
            display: inline-block;
            margin-left: 0.5rem;
            vertical-align: middle;
            letter-spacing: 0.04em;
        }

        tr.section-divider td {
            border-bottom: 2px solid var(--border-color);
            height: 1px;
            padding: 0;
        }
    </style>
</head>

    <header>

    const childWrapper = document.getElementById('childTabsWrapper');

    if (parentKey === 'Wholesale-bodykits') {
        // Wholesale bodykits: Sub-tabs are Makes. No child tabs.
        subWrapper.style.display = 'block';
        childWrapper.style.display = 'none';
        
        // Find all unique makes in Wholesale-bodykits
        const makes = [...new Set(masterData[parentKey].map(item => item.make))].sort();
        currentSub = makes[0] || '';
        currentChild = '';
        
        renderSubTabs(makes, (make) => {
            currentSub = make;
            renderTable();
        });
        
    } else {
        // Categories dashboards
        subWrapper.style.display = 'block';
        childWrapper.style.display = 'block';
        
        const categories = Object.keys(masterData[parentKey]);
        currentSub = categories[0] || '';
        
        const brands = Object.keys(masterData[parentKey][currentSub] || {});
        currentChild = currentSub.includes('Spoiler') || currentSub.includes('Wing') ? 'ALL' : (brands[0] || '');
        
        renderSubTabs(categories, (cat) => {
            currentSub = cat;
            const freshBrands = Object.keys(masterData[parentKey][cat] || {});
            currentChild = cat.includes('Spoiler') || cat.includes('Wing') ? 'ALL' : (freshBrands[0] || '');
            renderChildTabs(freshBrands);
            renderTable();
        });
        
        renderChildTabs(brands);
    }

    renderTable();
}

function renderSubTabs(list, onClickCallback) {
    const container = document.getElementById('subTabs');
    container.innerHTML = '';
    list.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'sub-btn' + (item === currentSub ? ' active' : '');
        btn.textContent = item;
        btn.onclick = () => {
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            onClickCallback(item);
        };
        container.appendChild(btn);
    });
}

function renderChildTabs(brands) {
    const container = document.getElementById('childTabs');
    container.innerHTML = '';
    
    // Add ALL button if spoilers & wings
    if (currentSub.includes('Spoiler') || currentSub.includes('Wing')) {
        const allBtn = document.createElement('button');
        allBtn.className = 'child-btn' + (currentChild === 'ALL' ? ' active' : '');
        allBtn.textContent = 'ALL';
        allBtn.onclick = () => {
            currentChild = 'ALL';
            document.querySelectorAll('.child-btn').forEach(b => b.classList.remove('active'));
            allBtn.classList.add('active');
            renderTable();
        };
        container.appendChild(allBtn);
    }
    
    brands.forEach(brand => {
        const btn = document.createElement('button');
        btn.className = 'child-btn' + (brand === currentChild ? ' active' : '');
        btn.textContent = brand;
        btn.onclick = () => {
            currentChild = brand;
            document.querySelectorAll('.child-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        };
        container.appendChild(btn);
    });
}

function renderTable() {
    const head = document.getElementById('productsTableHead');
    const tbody = document.getElementById('productsTableBody');
    const panelTitle = document.getElementById('panelTitle');
    const searchBox = document.getElementById('searchBox');
    
    tbody.innerHTML = '';
    searchBox.value = '';
    
    // Set 7-column headers exactly matching the screenshot
    head.innerHTML = `
        <tr>
            <th style="width: 50px;">#</th>
            <th style="width: 180px;">Category & Make</th>
            <th style="width: 300px;">Product & Options</th>
            <th style="width: 140px;">CSV Base Price</th>
            <th style="width: 140px;">Live Base Price</th>
            <th>Live Store Variants</th>
            <th style="width: 180px;">Actions & Links</th>
        </tr>
    `;

    if (currentParent === 'Wholesale-bodykits') {
        panelTitle.textContent = `Wholesale Body Kits - Make: ${currentSub}`;
        
        const items = masterData[currentParent].filter(item => item.make === currentSub);
        items.forEach((item, idx) => {
            // 1. Render Parent Row
            const parentTr = document.createElement('tr');
            parentTr.className = 'parent-row';
            
            let actionsHtml = '';
            if (item.handle && item.handle !== '#') {
                actionsHtml += `<a href="https://myeliteti.com/products/${item.handle}" target="_blank" class="btn-action preview" style="margin-right:0.3rem;">🌐 Preview</a>`;
                actionsHtml += `<a href="https://myeliteti.myshopify.com/admin/products/${item.id}" target="_blank" class="btn-action admin">⚙️ Admin</a>`;
            }
            
            parentTr.innerHTML = `
                <td class="col-index">${idx + 1}</td>
                <td>
                    <span class="category-tag">${item.category || 'Body Kit'}</span>
                    <div style="font-size: 0.85rem; margin-top: 0.25rem; color: var(--text-secondary);">${item.make}</div>
                </td>
                <td>
                    <div style="font-weight:600; font-size:0.95rem; color: var(--text-primary);">${item.title}</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); margin-top:0.3rem;">Handle: \`${item.handle}\`</div>
                    <div style="font-size: 0.8rem; font-family: monospace; color: var(--accent-yellow); margin-top: 0.2rem;">ID: ${item.id}</div>
                </td>
                <td colspan="3" style="color: var(--text-secondary); font-size: 0.85rem; vertical-align: middle;">
                    ${item.components ? item.components.length : 0} components configured
                </td>
                <td>
                    <div class="actions-cell" style="display: flex; gap: 0.3rem;">
                        ${actionsHtml}
                    </div>
                </td>
            `;
            tbody.appendChild(parentTr);
            
            // 2. Render Child Component Rows
            if (item.components && item.components.length > 0) {
                item.components.forEach(c => {
                    const childTr = document.createElement('tr');
                    childTr.className = c.is_carbon_only ? 'child-row carbon-only-row' : 'child-row';
                    
                    childTr.innerHTML = `
                        <td></td>
                        <td style="color: var(--text-secondary); font-size: 0.85rem; text-align: right; padding-right: 1.5rem; vertical-align: middle;">
                            ↳ Component
                        </td>
                        <td>
                            <div style="font-weight: 600; color: #ffffff;">${c.name}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.15rem;">
                                Model spec: ${item.model || ''} ${item.style || ''}
                            </div>
                            ${c.is_carbon_only ? '<span class="carbon-only-badge">⚡ CARBON ONLY (NO FRP)</span>' : ''}
                        </td>
                        <td style="color: var(--accent-yellow); font-weight: 600; font-family: monospace; vertical-align: middle;">${c.csv_price || 'N/A'}</td>
                        <td style="color: var(--success-green); font-weight: 600; font-family: monospace; vertical-align: middle;">${c.live_base || 'N/A'}</td>
                        <td style="font-size: 0.8rem; color: var(--text-secondary); vertical-align: middle; line-height: 1.4;">${c.variants || ''}</td>
                        <td></td>
                    `;
                    tbody.appendChild(childTr);
                });
            }
            
            // 3. Section Divider Row
            const dividerTr = document.createElement('tr');
            dividerTr.className = 'section-divider';
            dividerTr.innerHTML = `<td colspan="7"></td>`;
            tbody.appendChild(dividerTr);
        });
        
    } else {
        panelTitle.textContent = `${currentParent.replace(/-/g, ' ').replace('etc', '& Aero')} - ${currentSub} - ${currentChild}`;
        
        let items = [];
        const catData = masterData[currentParent][currentSub] || {};
        if (currentChild === 'ALL') {
            Object.keys(catData).forEach(b => {
                items = items.concat(catData[b]);
            });
        } else {
            items = catData[currentChild] || [];
        }
        
        items.forEach((item, idx) => {
            const tr = document.createElement('tr');
            tr.className = 'parent-row';
            
            const actualPid = item.pid || item.id;
            let pidHtml = 'N/A';
            if (actualPid && actualPid !== 'N/A') {
                pidHtml = `<span class="pid-badge" onclick="navigator.clipboard.writeText('${actualPid}')">📋 ${actualPid}</span>`;
            }
            
            let variantsText = '';
            if (item.variants && item.variants.length > 0) {
                item.variants.forEach(v => {
                    variantsText += `${v.name} ($${v.price})<br>`;
                });
            }
            
            const compCategory = item.category || currentSub || 'Component';
            const makeText = item.make || currentChild || '';
            const csvPrice = item.csv_price || 'N/A';
            const liveBasePrice = item.live_base || (item.variants && item.variants.length > 0 ? `$${item.variants[0].price}` : 'N/A');
            
            let actionsHtml = '';
            if (item.handle && item.handle !== '#') {
                actionsHtml += `<a href="https://myeliteti.com/products/${item.handle}" target="_blank" class="btn-action preview" style="margin-right:0.3rem;">🌐 Preview</a>`;
                if (actualPid && actualPid !== 'N/A') {
                    actionsHtml += `<a href="https://myeliteti.myshopify.com/admin/products/${actualPid}" target="_blank" class="btn-action admin">⚙️ Admin</a>`;
                }
            }
            
            tr.innerHTML = `
                <td class="col-index">${idx + 1}</td>
                <td>
                    <span class="category-tag">${compCategory}</span>
                    <div style="font-size: 0.85rem; margin-top: 0.25rem; color: var(--text-secondary);">${makeText}</div>
                </td>
                <td>
                    <div style="font-weight:600; font-size:0.95rem; color: var(--text-primary);">${item.target || item.title || 'N/A'}</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); margin-top:0.3rem;">Handle: \`${item.handle}\`</div>
                    <div style="font-size: 0.8rem; font-family: monospace; color: var(--accent-yellow); margin-top: 0.2rem;">ID: ${actualPid || 'N/A'}</div>
                </td>
                <td style="color: var(--accent-yellow); font-weight: 600; font-family: monospace; vertical-align: middle;">${csvPrice}</td>
                <td style="color: var(--success-green); font-weight: 600; font-family: monospace; vertical-align: middle;">${liveBasePrice}</td>
                <td style="font-size: 0.8rem; color: var(--text-secondary); vertical-align: middle; line-height: 1.4;">${variantsText}</td>
                <td>
                    <div class="actions-cell" style="display: flex; gap: 0.3rem;">
                        ${actionsHtml}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
            
            // Section Divider Row
            const dividerTr = document.createElement('tr');
            dividerTr.className = 'section-divider';
            dividerTr.innerHTML = `<td colspan="7"></td>`;
            tbody.appendChild(dividerTr);
        });
    }
}

function filterTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    const tbody = document.getElementById('productsTableBody');
    const rows = tbody.querySelectorAll('tr');
    const noResults = document.getElementById('noResults');
    let visible = 0;
    
    rows.forEach(row => {
        if (row.textContent.toLowerCase().includes(q)) {
            row.style.display = '';
            visible++;
        } else {
            row.style.display = 'none';
        }
    });
    
    noResults.style.display = visible === 0 ? 'block' : 'none';
}

// Initial Load
switchParent('Wholesale-bodykits');
</script>
</body>
</html>
