<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Ti - Wholesale Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-lime': '#C4F101',
                        'brand-dark': '#000000',
                        'brand-gray-text': '#71717A',
                        'brand-row-alt': '#F9FAFB'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; font-size: 11px; color: #18181B; }
        
        /* Header & Nav */
        .btn-kits { background-color: #C4F101; color: #000; font-weight: 800; }
        .btn-hoods { background-color: #1A1A1A; color: #FFF; font-weight: 500; }
        .btn-inactive { background-color: #1A1A1A !important; color: #888 !important; }
        
        /* Table Structure - Super Compact */
        table { border-spacing: 0; width: 100%; }
        th { 
            background-color: #000; color: #FFF; font-weight: 800; 
            font-size: 10px; text-transform: uppercase; padding: 6px 12px;
            text-align: left; border-right: 1px solid #333;
        }
        th:last-child { border-right: none; }
        
        td { 
            padding: 4px 12px; border-bottom: 1px solid #E4E4E7; 
            font-size: 11px; vertical-align: middle; line-height: 1.2;
        }
        
        .brand-col { font-weight: 700; color: #52525B; width: 10%; }
        .model-col { font-weight: 600; color: #18181B; width: 15%; }
        .style-col { color: #71717A; width: 10%; }
        .part-col { color: #27272A; width: 35%; }
        .sku-col { color: #71717A; width: 10%; font-family: monospace; }
        .price-col { font-weight: 800; text-align: right; width: 15%; padding-right: 24px; font-size: 12px; }
        
        tr:nth-child(even) { background-color: #F8F8F8; }
        .row-hover:hover { background-color: #F3F4F6 !important; }

        /* Filter Controls - Ultra Slim */
        .filter-strip { background: #000; padding: 4px 8px; display: flex; gap: 4px; align-items: center; }
        .filter-select { 
            background: #18181B; color: #FFF; border: 1px solid #333; 
            font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 2px;
            height: 24px; min-width: 80px; flex: 1;
        }
        .filter-input {
            background: #18181B; color: #FFF; border: 1px solid #333;
            font-size: 9px; padding: 2px 8px; border-radius: 2px;
            height: 24px; flex: 1;
        }
        .filter-input::placeholder { color: #555; }

        .search-container { padding: 12px 24px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #E5E7EB; }
        .search-bar { flex-grow: 1; border: 1px solid #E4E4E7; padding: 8px 16px; font-size: 11px; border-radius: 2px; }
        .btn-reset { border: 1px solid #000; font-weight: 700; font-size: 10px; padding: 8px 16px; text-transform: uppercase; }

        .logo-box { width: 84px; height: 50px; background: white; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 2px; }

        /* Zoom Correction */
        html { zoom: 90%; }
        @media screen and (min-width: 2000px) { html { zoom: 110%; } }
    </style>
</head>
<body class="bg-white">

    <!-- Navbar Like Screenshot -->
    <header class="bg-black px-6 py-2.5 flex items-center justify-between">
        <div class="logo-box rounded-sm shadow-sm overflow-hidden">
            <img src="logo.png" alt="ETI LOGO" class="max-h-full max-w-full object-contain">
        </div>
        
        <div class="flex gap-0.5">
            <button id="tab-kits" onclick="switchCategory('kits')" class="px-10 py-2.5 btn-kits text-[11px] uppercase tracking-wider">Body Kits</button>
            <button id="tab-hoods" onclick="switchCategory('hoods')" class="px-10 py-2.5 btn-hoods text-[11px] uppercase tracking-wider btn-inactive">Hoods & Carbon</button>
        </div>
        
        <button class="bg-brand-lime px-5 py-2.5 font-extrabold text-[10px] flex items-center gap-1.5 rounded-sm">
            <svg class="w-3.5 h-3.5" stroke="currentColor" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
            UPLOAD CSV
        </button>
    </header>

    <!-- Search Section -->
    <div class="search-container bg-white">
        <div class="relative flex-grow">
            <input type="text" id="global-search" oninput="handleFilter()" placeholder="SEARCH CATALOG..." class="search-bar w-full outline-none focus:border-brand-lime">
        </div>
        <button onclick="resetFilters()" class="btn-reset hover:bg-black hover:text-white transition-all">Reset Filters</button>
    </div>

    <!-- Filter Strip -->
    <div class="filter-strip">
        <select id="brand-filter" onchange="handleFilter()" class="filter-select"><option value="">MAKE</option></select>
        <select id="model-filter" onchange="handleFilter()" class="filter-select"><option value="">MODEL</option></select>
        <select id="style-filter" onchange="handleFilter()" class="filter-select"><option value="">STYLE</option></select>
        <select id="part-filter" onchange="handleFilter()" class="filter-select"><option value="">PART</option></select>
        <input type="text" id="sku-filter" oninput="handleFilter()" placeholder="SEARCH SKU..." class="filter-input">
        <input type="number" id="min-price" oninput="handleFilter()" placeholder="MIN" class="filter-input !flex-initial w-20">
        <input type="number" id="max-price" oninput="handleFilter()" placeholder="MAX" class="filter-input !flex-initial w-20">
    </div>

    <!-- Table -->
    <div class="w-full overflow-x-auto">
        <table class="min-w-full">
            <thead>
                <tr>
                    <th class="brand-col">Make</th>
                    <th class="model-col">Model</th>
                    <th class="style-col">Style</th>
                    <th class="part-col">Part</th>
                    <th class="sku-col">Sku</th>
                    <th class="price-col">Eti Rrp</th>
                </tr>
            </thead>
            <tbody id="catalog-body">
                <!-- Data -->
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden py-40 text-center border-b border-gray-100">
        <p class="text-gray-300 font-bold uppercase text-xs">No Data Found</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
