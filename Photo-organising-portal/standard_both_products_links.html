        let activeTab = 'both';

        function switchTab(tabName) {
            activeTab = tabName;
            
            // Toggle Tab Buttons Styling
            const btnBoth = document.getElementById('tab-both');
            const btnMat5 = document.getElementById('tab-material_5');
            const btnMat4 = document.getElementById('tab-material_4');
            const btnSynced = document.getElementById('tab-synced');
            
            // Clear selections
            btnBoth.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider text-zinc-500 hover:text-zinc-300 transition-all";
            btnMat5.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider text-zinc-500 hover:text-zinc-300 transition-all";
            btnMat4.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider text-zinc-500 hover:text-zinc-300 transition-all";
            if (btnSynced) btnSynced.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider text-zinc-500 hover:text-zinc-300 transition-all";
            
            if (tabName === 'both') {
                btnBoth.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider border-b-2 border-[#C4F101] text-white transition-all";
                document.getElementById('label-category').innerText = "Both Mat & Comp";
                document.getElementById('badge-title').innerText = "220 PRODUCTS";
            } else if (tabName === 'material_5') {
                btnMat5.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider border-b-2 border-[#C4F101] text-white transition-all";
                document.getElementById('label-category').innerText = "5 Main Material Option";
                document.getElementById('badge-title').innerText = "272 PRODUCTS";
            } else if (tabName === 'material_4') {
                btnMat4.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider border-b-2 border-[#C4F101] text-white transition-all";
                document.getElementById('label-category').innerText = "4 Main Material Option";
                document.getElementById('badge-title').innerText = "252 PRODUCTS";
            } else if (tabName === 'synced') {
                if (btnSynced) btnSynced.className = "px-4 py-2.5 text-xs font-black uppercase tracking-wider border-b-2 border-[#C4F101] text-white transition-all";
                document.getElementById('label-category').innerText = "Synced Custom Order Templates";
                document.getElementById('badge-title').innerText = "28 PRODUCTS";
            }
            document.getElementById('search-input').value = '';
            filterList();
        }

        function renderProducts(list) {
            const container = document.getElementById('product-rows');
            container.innerHTML = '';
            
            document.getElementById('count-total').innerText = list.length;
            
            if (list.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-8 text-center text-zinc-500 uppercase font-bold tracking-wider">No matching products found</td>
                    </tr>
                `;
                return;
            }

            list.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-zinc-900/30 transition-colors text-zinc-300';
                
                // Public link
                const publicUrl = `https://myeliteti.myshopify.com/products/${p.handle}`;
                // Admin link
                const adminUrl = `https://admin.shopify.com/store/myeliteti/products/${p.id}`;

                tr.innerHTML = `
                    <td class="py-3 px-4 font-mono text-zinc-500">${idx + 1}</td>
                    <td class="py-3 px-4 font-semibold text-white tracking-wide">${p.title}</td>
                    <td class="py-3 px-4">
                        <a href="${publicUrl}" target="_blank" class="text-[#C4F101] hover:underline font-bold inline-flex items-center gap-1">
                            VIEW LIVE STORE ↗
                        </a>
                    </td>
                    <td class="py-3 px-4">
                        <a href="${adminUrl}" target="_blank" class="text-zinc-400 hover:text-white hover:underline font-bold inline-flex items-center gap-1">
                            OPEN IN ADMIN ↗
                        </a>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        function filterList() {
            const val = document.getElementById('search-input').value.toLowerCase().trim();
            const list = datasets[activeTab];
            const filtered = list.filter(p => p.title.toLowerCase().includes(val));
            renderProducts(filtered);
        }

        // Initial render
        switchTab('both');
    </script>
